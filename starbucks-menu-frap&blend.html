<html>
    <head>
        <title>
            Frappuccino | Starbucks' Menu
        </title>
        <style>
            .horizontal-scroll {
                display: flex;
                overflow-x: auto;
                gap: 20px;
            }

            .drink-card {
                min-width: 200px;
            }
        </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body style="background-color: rgb(25, 20, 18);">
        <div class="container">
            <div class="row pt-3 mb-3"> <!--Main banner-->
                <div class="col">
                    <div class="d-flex rounded-4 justify-content-center align-items-center gap-3 text-dark p-5" style="background-color: rgb(0, 45, 30);">
                        <p class="h1" style="font-family:Impact; color:rgb(180, 180, 180)"><strong>Starbucks | Frappuccino & Blended Beverages</strong></p>
                    </div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <div class="horizontal-scroll">
                        <div class="card drink-card" style="width:300px;">
                            <div class="row">
                                <div class="col text-center"><img class="card-img-top rounded-circle object-fit-cover border border-3 shadow" src="images/starbucks/frappuccino-starbucks.png" style="height:100px; width:100px;"></div>
                                <div class="col text-center"><img class="card-img-top rounded-circle object-fit-cover border border-3 shadow" src="images/starbucks/blended-beverages-starbucks.png" style="height:100px; width:100px;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <div class="d-flex rounded-5 p-3 justify-content-center align-items-center" style="background-color: rgb(25, 40, 40); width: 300px">
                        <p class="h1" style="color: white;"><u>Comparisons</u></p>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <table class="table border rounded rounded-3 overflow-hidden table-dark">
                        <thead>
                            <th scope="col">#</th>
                            <th scope="col">Drinks' Names</th>
                            <th scope="col">Main Flavor</th>
                            <th scope="col">Protein</th>
                            <th scope="col">Caffeine</th>
                        </thead>
                        <tbody>
                            <th scope="col">1.</th>
                            <td>Caramel Frappuccino® Blended Beverages</td>
                            <td>Caramel</td>
                            <td>~</td>
                            <td>✔️</td>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    <div class="btn-group" style="position: fixed; bottom: 10px; right: 10px" role="group" aria-label="Basic example">
        <a href="starbucks-menu.html" class="btn border" style="background-color: rgb(0, 45, 30); color: rgb(230, 230, 230);">Menu</a>
        <a href="starbucks-minicollection.html" class="btn border" style="background-color: rgb(0, 45, 30); color: rgb(230, 230, 230);">Starbucks</a>
        <a href="index.html" class="btn btn-outline-success border" style="color: white">Home</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
