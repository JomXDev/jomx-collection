<html>
    <head>
        <title>JomX Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body style="background-color: rgb(15,15,15);">
        <div class="container"> <!--This holds everything-->
            <div class="row pt-3"> <!--Main banner-->
                <div class="col">
                    <div class="d-flex rounded-4 justify-content-center align-items-center gap-5 text-dark p-5" style="background-color: rgb(0, 83, 56);">
                        <p class="h1" style="font-family:Impact; color:rgb(180, 180, 180)"><strong><em>JomX Collection</em></strong></p>
                        <img src="images/jx-logo-png.png" class="rounded-circle object-fit-cover border border-3" style="height: 100px; width: 100px;">
                    </div>
                </div>
            </div>
            <div class="row"> <!--Foods title-->
                <div class="col pt-3 mb-3">
                    <div class="d-flex rounded-5 p-3 justify-content-center align-items-center" style="background-color: rgb(25, 40, 40); width: 200px">
                        <p class="h1" style="color: rgb(230, 230, 230);"><u>Foods</u></p>
                    </div>
                </div>
            </div>
            <div class="row"> <!--Starbucks card (1)-->
                <div class="col mb-3">
                    <div class="card rounded-4" style="width: 18rem; background-color: rgb(230, 230, 230);">
                        <img class="card-img-top rounded-circle object-fit-cover border border-3" src="images/starbucks-logo-png.png" style="height:100px; width:100px;">
                        <div class="card-body">
                            <h5 class="card-title" style="color:rgb(0, 83, 56)">Starbucks</h5>
                            <p class="card-text">Learn more about Starbucks that sits at every corner of your life!</p>
                            <a href="starbucks-minicollection.html" class="btn btn-outline-success" style="color: rgb(0, 83, 56)">Learn more!</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row"> <!--Information placeholder card-->
                <div class="col mb-3">
                    <div class="card rounded-4" style="width: 18rem; background-color: rgb(230, 230, 230);">
                        <div class="card-body">
                            <h5 class="card-title" style="color:rgb(0, 0, 0)">Coming Soon!</h5>
                            <p class="card-text">Other categories like History, Restaurants, Stores and many more will be later added! Unfortunately, please enjoy what we have for now!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
</html>
